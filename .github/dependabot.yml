version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    # Picks up container image digests in workflow files
    # (barichello/godot-ci@sha256:…) plus any future Dockerfiles.
