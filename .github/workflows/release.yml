name: Release

on:
  push:
    branches: [main]
    # release-please tags land here (poki-soweli-vX.Y.Z). Triggering on
    # the tag push lets the asset jobs run under the same PAT that pushed
    # the tag, so artifacts attach to the release. The 'release: published'
    # event is unreliable because GITHUB_TOKEN-created releases are muted
    # by GitHub's recursion guard.
    tags: ['*-v*']

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          # PAT (not GITHUB_TOKEN) so release-please's tag push fires the
          # downstream tag-triggered jobs in this same workflow.
          token: ${{ secrets.CI_GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-android-release:
    name: Build Android Release APK
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: Setup Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Install Android build tools
        run: |
          printf 'y\n%.0s' {1..100} | sdkmanager --licenses > /dev/null
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      - name: Setup Godot (with export templates)
        uses: chickensoft-games/setup-godot@f166999204a4f2722c6fe042fbaa3b3ea0d9c789 # v2.4.1
        with:
          version: 4.6.2
          use-dotnet: false
          include-templates: true

      - name: Import project resources
        run: godot --headless --path . --import --quit-after 180

      - name: Generate debug keystore (fallback — no production keystore yet)
        run: |
          mkdir -p android
          keytool -genkeypair \
            -keystore android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Sync APK version from release tag
        run: |
          # Tag format is 'poki-soweli-vX.Y.Z' (release-please's component
          # + prefix). Strip the full 'poki-soweli-v' to get a plain semver.
          # version/code bumps monotonically so Android treats each release
          # as an upgrade regardless of source order.
          VERSION_NAME="${RELEASE_TAG#poki-soweli-v}"
          VERSION_CODE=$(date -u +%s)
          echo "Setting APK version_name=${VERSION_NAME} version_code=${VERSION_CODE}"
          sed -i -E "s|^version/name=.*|version/name=\"${VERSION_NAME}\"|" export_presets.cfg
          sed -i -E "s|^version/code=.*|version/code=${VERSION_CODE}|" export_presets.cfg

      - name: Configure Godot Android SDK path
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres <<EOF
          [gd_resource type="EditorSettings"]
          [resource]
          export/android/android_sdk_path = "${ANDROID_SDK_ROOT}"
          EOF

      - name: Export Android APK
        run: |
          mkdir -p export/android
          APK_NAME="poki-soweli-${RELEASE_TAG}.apk"
          set +e
          godot --headless --path . \
            --export-release "Android Release" \
            "export/android/${APK_NAME}"
          set -e
          if [ ! -f "export/android/${APK_NAME}" ]; then
            echo "::error::APK was not produced"
            exit 1
          fi
          echo "APK_PATH=export/android/${APK_NAME}" >> "$GITHUB_ENV"

      - name: Upload APK to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ${{ env.APK_PATH }}

  build-html5-release:
    name: Build HTML5 Release Export
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: Setup Godot (with export templates)
        uses: chickensoft-games/setup-godot@f166999204a4f2722c6fe042fbaa3b3ea0d9c789 # v2.4.1
        with:
          version: 4.6.2
          use-dotnet: false
          include-templates: true

      - name: Import project resources
        run: godot --headless --path . --import --quit-after 180

      - name: Export HTML5
        run: |
          mkdir -p export/html5
          # Vendored — see cd.yml for rationale.
          set +e
          godot --headless --path . \
            --export-release "HTML5" \
            export/html5/index.html
          set -e
          if [ ! -f export/html5/index.html ]; then
            echo "::error::HTML5 export was not produced"
            exit 1
          fi
          ZIP_NAME="poki-soweli-${RELEASE_TAG}-web.zip"
          cd export && zip -r "../${ZIP_NAME}" html5/
          echo "ZIP_PATH=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Upload web export to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ${{ env.ZIP_PATH }}
