name: release

# Runs on every push to main. release-please walks the conventional-
# commit history, opens or updates a release PR with an accumulated
# CHANGELOG + version bump, and — when that PR merges — tags a
# release. On the tagged release, this workflow builds the versioned
# web bundle and the debug APK, attaches them to the GitHub Release.
# cd.yml then consumes those artifacts to deploy to Pages.
#
# Security: no user-text interpolation in run: blocks. release-please
# reads commit messages, but that logic lives inside the action.
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-web-bundle:
    name: build versioned web bundle
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --ignore-workspace --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Package + attach web bundle to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          tar -czf "poki-soweli-web-${TAG_NAME}.tar.gz" -C dist .
          gh release upload "$TAG_NAME" "poki-soweli-web-${TAG_NAME}.tar.gz" --clobber

  build-release-apk:
    name: build release APK
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - name: Install JS deps
        run: pnpm install --ignore-workspace --frozen-lockfile

      - name: Build web bundle
        run: pnpm build

      - name: Initialize Android platform
        run: |
          if [ ! -d android ]; then
            pnpm exec cap add android
          fi

      - name: Sync Capacitor
        run: pnpm exec cap sync android

      - name: Grant gradlew execute permission
        working-directory: android
        run: chmod +x gradlew

      # TODO: swap to assembleRelease + signingConfig once the release
      # keystore is provisioned (secrets.ANDROID_KEYSTORE_BASE64 +
      # KEYSTORE_PASSWORD + KEY_ALIAS + KEY_PASSWORD). Debug-signed
      # APK is what we ship until then.
      - name: Assemble debug APK (pending release keystore)
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Attach APK to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk "poki-soweli-${TAG_NAME}.apk"
          gh release upload "$TAG_NAME" "poki-soweli-${TAG_NAME}.apk" --clobber
