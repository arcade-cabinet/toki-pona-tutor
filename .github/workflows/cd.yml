name: cd

# Deploys to GitHub Pages after the `release` workflow finishes.
# release.yml creates or updates the GitHub Release, then uploads the
# versioned web bundle, debug APK, and metadata as workflow artifacts.
# This workflow consumes those artifacts, attaches the versioned files
# to the GitHub Release, and deploys the web bundle to Pages.
#
# Flow:
#   push → main  →  release.yml (release-please + build artifacts)
#                   ↓ workflow_run: completed
#   cd.yml (this file) — consume artifacts, attach to release, deploy
#
# `workflow_dispatch` is retained for manual redeploy of a known-good
# release tag after the web bundle has already been attached.
on:
  workflow_run:
    workflows: [release]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to redeploy (e.g. v0.2.0). Defaults to latest release.'
        required: false

permissions:
  actions: read
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-pages:
    name: attach artifacts + deploy to GitHub Pages
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Resolve release source
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            if ! gh run download "$RUN_ID" --name release-metadata --dir release-metadata 2>/dev/null; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "No release-metadata artifact on workflow run $RUN_ID; nothing to deploy."
              exit 0
            fi

            metadata_path=$(find release-metadata -type f -name 'release.json' | head -n 1)
            if [ -z "$metadata_path" ]; then
              echo "release-metadata artifact did not contain release.json" >&2
              exit 1
            fi

            tag=$(jq -r '.tag_name' "$metadata_path")
            version=$(jq -r '.version' "$metadata_path")
            sha=$(jq -r '.sha' "$metadata_path")
            web_artifact=$(jq -r '.web_bundle_artifact' "$metadata_path")
            web_file=$(jq -r '.web_bundle_file' "$metadata_path")
            apk_artifact=$(jq -r '.android_debug_apk_artifact // .android_release_apk_artifact' "$metadata_path")
            apk_file=$(jq -r '.android_debug_apk_file // .android_release_apk_file' "$metadata_path")

            for required in tag version sha web_artifact web_file apk_artifact apk_file; do
              value="${!required}"
              if [ -z "$value" ] || [ "$value" = "null" ]; then
                echo "release metadata field '$required' is missing or null" >&2
                exit 1
              fi
            done
          elif [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          else
            tag=$(gh release view --json tagName --jq .tagName)
          fi

          {
            echo "skip=false"
            echo "tag=$tag"
            echo "version=${version:-}"
            echo "sha=${sha:-}"
            echo "web_artifact=${web_artifact:-web-bundle-$tag}"
            echo "web_file=${web_file:-poki-soweli-web-$tag.tar.gz}"
            echo "apk_artifact=${apk_artifact:-android-debug-apk-$tag}"
            echo "apk_file=${apk_file:-poki-soweli-$tag-debug.apk}"
          } >> "$GITHUB_OUTPUT"
          echo "Deploying release $tag"

      - name: Download build artifacts from release workflow
        if: steps.release.outputs.skip != 'true' && github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          WEB_ARTIFACT: ${{ steps.release.outputs.web_artifact }}
          WEB_FILE: ${{ steps.release.outputs.web_file }}
          APK_ARTIFACT: ${{ steps.release.outputs.apk_artifact }}
          APK_FILE: ${{ steps.release.outputs.apk_file }}
        run: |
          set -euo pipefail
          mkdir -p downloaded/web downloaded/android

          gh run download "$RUN_ID" --name "$WEB_ARTIFACT" --dir downloaded/web
          gh run download "$RUN_ID" --name "$APK_ARTIFACT" --dir downloaded/android

          web_path=$(find downloaded/web -type f -name "$WEB_FILE" | head -n 1)
          apk_path=$(find downloaded/android -type f -name "$APK_FILE" | head -n 1)

          if [ -z "$web_path" ] || [ -z "$apk_path" ]; then
            echo "Expected release artifacts were not found in workflow run $RUN_ID" >&2
            exit 1
          fi

          cp "$web_path" "$WEB_FILE"
          cp "$apk_path" "$APK_FILE"

      - name: Attach artifacts to GitHub release
        if: steps.release.outputs.skip != 'true' && github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
          WEB_FILE: ${{ steps.release.outputs.web_file }}
          APK_FILE: ${{ steps.release.outputs.apk_file }}
        run: gh release upload "$TAG_NAME" "$WEB_FILE" "$APK_FILE" --clobber

      - name: Prepare deploy bundle
        if: steps.release.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
          WEB_FILE: ${{ steps.release.outputs.web_file }}
        run: |
          set -euo pipefail
          mkdir -p dist

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            gh release download "$TAG_NAME" \
              --pattern "$WEB_FILE" \
              --output "$WEB_FILE"
          fi

          tar -xzf "$WEB_FILE" -C dist

          if ! grep -q '/poki-soweli/manifest.json' dist/index.html ||
             ! grep -q '/poki-soweli/assets/' dist/index.html; then
            echo "web bundle was not built with the GitHub Pages base" >&2
            exit 1
          fi

          required_files=(
            index.html
            manifest.json
            default-bundle.json
            revoltfx-spritesheet.json
            map/ma_lete.tmx
            map/ma_telo.tmx
            map/ma_tomo_lili.tmx
            map/nasin_pi_telo.tmx
            map/nasin_wan.tmx
            map/nena_sewi.tmx
            map/nena_suli.tmx
          )
          for file in "${required_files[@]}"; do
            if [ ! -f "dist/$file" ]; then
              echo "web bundle is missing required runtime file: $file" >&2
              exit 1
            fi
          done

      - if: steps.release.outputs.skip != 'true'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - if: steps.release.outputs.skip != 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./dist

      - if: steps.release.outputs.skip != 'true'
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
