name: cd

# Deploys to GitHub Pages. Triggered by the `release: published` event
# that release.yml fires after release-please cuts a tag + its
# `attach-web-bundle` job uploads the `poki-soweli-web-*.tar.gz`
# asset. CD strictly downloads + deploys that asset — it never
# builds from source.
#
# Flow:
#   push → main  →  release.yml (release-please + attach web bundle)
#                   ↓ release: published
#   cd.yml (this file) — download web-bundle asset, deploy to Pages
#
# `workflow_dispatch` is retained for manual redeploy of a known-good
# release if Pages hosting needs a kick.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to redeploy (e.g. poki-soweli-v0.2.0). Defaults to latest release.'
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-pages:
    name: deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve release tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          # Release event → use the tag that triggered us.
          # Manual dispatch with input → use that tag.
          # Manual dispatch without input → latest release.
          if [ -n "$EVENT_TAG" ]; then
            tag="$EVENT_TAG"
          elif [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          else
            tag=$(gh release view --json tagName --jq .tagName)
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Deploying release $tag"

      - name: Download web bundle from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p dist
          gh release download "$TAG_NAME" \
            --pattern "poki-soweli-web-*.tar.gz" \
            --output web-bundle.tar.gz
          tar -xzf web-bundle.tar.gz -C dist

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./dist

      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
