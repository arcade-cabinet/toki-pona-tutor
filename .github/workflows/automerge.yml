name: Automerge

# Enables safe squash auto-merge for bot PRs once CI, required reviews,
# and branch-protection rules are satisfied. Dependabot major bumps are
# explicitly excluded; those need human review.
#
# Uses `gh pr merge --auto --squash` so the merge waits for CI green
# AND required reviews AND branch-protection rules before actually
# merging. If any of those fail, the PR sits for a human.
on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve PR
        if: steps.meta.outputs.update-type != 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr review "$PR_URL" --approve

      - name: Auto-merge minor / patch updates
        if: steps.meta.outputs.update-type != 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"

  release-please:
    if: |
      startsWith(github.event.pull_request.head.ref, 'release-please--') &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        github.event.pull_request.user.login == 'github-actions[bot]' ||
        github.event.pull_request.user.login == 'jbdevprimary' ||
        (
          vars.RELEASE_PLEASE_PAT_OWNER != '' &&
          github.event.pull_request.user.login == vars.RELEASE_PLEASE_PAT_OWNER
        )
      )
    runs-on: ubuntu-latest
    env:
      # The auto-merge must be enabled with a real PAT so the eventual
      # squash-merge push triggers release.yml. A GITHUB_TOKEN-authored
      # merge can suppress downstream workflow runs.
      RELEASE_AUTOMERGE_TOKEN: ${{ secrets.CI_GITHUB_TOKEN_PAT || secrets.CI_GITHUB_TOKEN }}
    steps:
      - name: Assert release automerge token is configured
        if: env.RELEASE_AUTOMERGE_TOKEN == ''
        run: |
          echo "::error::Configure CI_GITHUB_TOKEN_PAT or CI_GITHUB_TOKEN for release-please automerge."
          exit 1

      - name: Approve PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr review "$PR_URL" --approve

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ env.RELEASE_AUTOMERGE_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
