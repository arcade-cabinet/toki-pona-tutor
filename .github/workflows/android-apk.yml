name: android-apk

# On every PR push: build the web bundle, sync it into the Capacitor
# Android project, compile a debug APK, and upload as a PR artifact
# so reviewers can sideload and test on a device.
#
# Security note: this workflow does not interpolate any user-supplied
# text (titles, bodies, commit messages) into `run:` blocks. The only
# dynamic value is ${{ github.event.pull_request.number }} which is a
# GitHub-controlled integer safe to use in artifact names.
on:
  pull_request:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install JS deps
        run: pnpm install --ignore-workspace --frozen-lockfile

      - name: Build web bundle
        run: pnpm build

      - name: Initialize Android platform (idempotent)
        run: |
          if [ ! -d android ]; then
            pnpm exec cap add android
          fi

      - name: Sync Capacitor
        run: pnpm exec cap sync android

      - name: Grant gradlew execute permission
        working-directory: android
        run: chmod +x gradlew

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: poki-soweli-debug-apk-${{ github.event.pull_request.number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: error
