name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Godot Project
    runs-on: ubuntu-latest
    container:
      # Pinned to digest for supply-chain safety; bump via dependabot/manual refresh.
      image: barichello/godot-ci@sha256:f81ce875656954f52670f5d7ae41bec952bd969c989c2880d0029fb15e2e6072  # 4.6.2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: Import assets
        run: godot --headless --import 2>&1 || true

      - name: Parse check (GDScript compilation)
        run: |
          godot --headless --quit 2>&1 | tee /tmp/godot_output.txt
          if grep -qi "parser error\|compile error" /tmp/godot_output.txt; then
            echo "::error::GDScript compilation errors found"
            grep -i "parser error\|compile error" /tmp/godot_output.txt
            exit 1
          fi

      - name: Validate spine content (writing rules + Tatoeba cache)
        run: timeout 120 godot --headless --path . --script res://tools/validate_tp.gd -- --offline

      - name: Build generated resources (spine → .tres)
        run: timeout 120 godot --headless --path . --script res://tools/build_spine.gd

      - name: Run gdUnit4 tests
        run: |
          if [ -d test ]; then
            timeout 300 godot --headless --path . \
              -s addons/gdUnit4/bin/GdUnitCmdTool.gd \
              --ignoreHeadlessMode -a test/
          else
            echo "test/ not yet present — skipping"
          fi

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    container:
      # Pinned to digest for supply-chain safety; bump via dependabot/manual refresh.
      image: barichello/godot-ci@sha256:f81ce875656954f52670f5d7ae41bec952bd969c989c2880d0029fb15e2e6072  # 4.6.2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true
      - run: godot --headless --import 2>&1 || true
      - name: Boot game briefly
        run: timeout 10 godot --headless --path . --quit-after 5 && echo "SMOKE OK"

  build-android-debug:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: Setup Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Install Android build tools
        run: |
          # Feed a finite, large-enough stream of 'y' answers (not the
          # infinite `yes`) so the producer never hits SIGPIPE when
          # sdkmanager closes stdin, while still accepting every license
          # non-interactively. 100 responses comfortably exceeds the
          # current license count.
          printf 'y\n%.0s' {1..100} | sdkmanager --licenses > /dev/null
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      - name: Setup Godot (with export templates)
        uses: chickensoft-games/setup-godot@f166999204a4f2722c6fe042fbaa3b3ea0d9c789 # v2.4.1
        with:
          version: 4.6.2
          use-dotnet: false
          include-templates: true

      - name: Import project resources
        # Two-pass import; see cd.yml for rationale (custom theme
        # loaded before its font resources are imported in pass 1).
        run: |
          godot --headless --path . --import --quit-after 180 || true
          godot --headless --path . --import --quit-after 180

      - name: Generate debug keystore
        run: |
          mkdir -p android
          keytool -genkeypair \
            -keystore android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Configure Godot Android SDK + keystore paths
        # Debug keystore generated above. Wire it into editor_settings so
        # --export-debug signs the APK instead of producing an unsigned
        # package (which Android refuses to install).
        run: |
          mkdir -p ~/.config/godot
          KEYSTORE_PATH="$(pwd)/android/debug.keystore"
          cat > ~/.config/godot/editor_settings-4.tres <<EOF
          [gd_resource type="EditorSettings"]
          [resource]
          export/android/android_sdk_path = "${ANDROID_SDK_ROOT}"
          export/android/debug_keystore = "${KEYSTORE_PATH}"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Export Android debug APK
        run: |
          mkdir -p export/android
          # Godot 4.6 + Dialogic's editor plugin segfault during _exit_tree
          # in headless mode AFTER the APK has been signed and written.
          # Trust the APK file as the source of truth, not the exit code.
          set +e
          godot --headless --path . \
            --export-debug "Android Debug Helper" \
            export/android/poki-soweli-debug.apk
          set -e
          if [ ! -f export/android/poki-soweli-debug.apk ]; then
            echo "::error::APK was not produced — real export failure"
            exit 1
          fi
          echo "APK size: $(stat -c%s export/android/poki-soweli-debug.apk) bytes"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-debug-apk-${{ github.event.pull_request.number }}
          path: export/android/poki-soweli-debug.apk
          retention-days: 14
