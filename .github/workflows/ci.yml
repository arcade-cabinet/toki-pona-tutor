name: ci

# PR gate. Runs on every pull request (no branch filter per global
# standards). Validates content pipeline, types, and the full build.
# Produces a debug APK as PR artifact for reviewer sideload testing.
#
# Security: this workflow does not interpolate user-supplied text
# into run: blocks. The only dynamic value is the PR number, a
# GitHub-controlled integer.
on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  conventional-commits:
    name: conventional commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Lint PR title and commits
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node scripts/check-conventional-commits.mjs

  unit:
    name: unit (pure-logic + validate + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --ignore-workspace --frozen-lockfile

      - name: Verify map-authoring contract
        run: pnpm author:verify

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit suite + coverage gate (pure-logic only)
        run: pnpm test:coverage

      - name: Maestro flow syntax check
        run: |
          curl -fsSL "https://github.com/mobile-dev-inc/maestro/releases/download/cli-2.4.0/maestro.zip" -o /tmp/maestro.zip
          echo "aea22ce67ab6718997ec990c58652ede0c2be8f10ac4799039ca3dce3390d634  /tmp/maestro.zip" | sha256sum -c -
          unzip -q /tmp/maestro.zip -d "$HOME/.maestro"
          export PATH="$HOME/.maestro/maestro/bin:$PATH"
          pnpm maestro:check

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov
          path: coverage
          retention-days: 7
          if-no-files-found: warn

  build:
    name: build web bundle + size audit
    runs-on: ubuntu-latest
    needs:
      - unit
      - integration
      - e2e-smoke
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --ignore-workspace --frozen-lockfile

      # The artifact that gets deployed to GitHub Pages in cd.yml must be
      # built with GITHUB_PAGES=true so vite rewrites the public-asset
      # URLs to `${base}assets/...` with base='/poki-soweli/'. Without
      # this flag every font + tilemap + wasm 404s under the
      # `/poki-soweli/` subpath.
      - name: Build web bundle (Pages base)
        env:
          GITHUB_PAGES: "true"
        run: pnpm build

      - name: Verify deployable Pages bundle
        run: node scripts/deploy/verify-pages-bundle.mjs dist

      - name: Web bundle size audit (T6-13)
        run: node tools/web-size-audit.mjs

      - name: Upload web bundle artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-bundle
          path: dist
          retention-days: 7
          if-no-files-found: error

  integration:
    name: integration (real RPG.js engine)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --ignore-workspace --frozen-lockfile

      - name: Run integration suite (@rpgjs/testing)
        run: pnpm test:integration

  e2e-smoke:
    name: e2e smoke (real browser, boot + golden-path sanity)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --ignore-workspace --frozen-lockfile

      - name: Install Playwright Chromium + OS deps
        run: pnpm exec playwright install --with-deps --no-shell chromium

      # xvfb-run gives the headed Chromium launch a virtual display so
      # Pixi/CanvasEngine renders with real WebGL in CI.
      # Smoke only — full feature-level E2E runs locally or on a
      # scheduled `e2e-full` workflow. Keeps CI per-push fast as the
      # suite grows.
      # (GitHub Actions sets CI=true automatically — no explicit env needed.)
      - name: Run Playwright smoke suite under xvfb
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" pnpm test:e2e:smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-smoke-report
          path: playwright-report
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-smoke-traces
          path: test-results
          retention-days: 7
          if-no-files-found: ignore

  android-debug-apk:
    name: build debug APK
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - name: Install JS deps
        run: pnpm install --ignore-workspace --frozen-lockfile

      # Capacitor WebView serves bundled assets from the app root, so the
      # web bundle going into the APK needs base='./'. CAPACITOR=true
      # switches vite to the relative-URL pattern.
      - name: Build web bundle (Capacitor base)
        env:
          CAPACITOR: "true"
        run: pnpm build

      - name: Initialize Android platform (idempotent)
        run: |
          if [ ! -d android ]; then
            pnpm exec cap add android
          fi

      - name: Sync Capacitor
        run: pnpm exec cap sync android

      - name: Grant gradlew execute permission
        working-directory: android
        run: chmod +x gradlew

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rivers-reckoning-debug-apk-${{ github.event.pull_request.number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: error
