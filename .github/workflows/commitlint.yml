name: commitlint

# ROADMAP T6-16 — Conventional Commits gate.
# Validates every commit in an open PR's range against the
# @commitlint/config-conventional rules. Runs on pull_request (no
# branch filter) per the ci → release → cd trifecta convention.
#
# Why title AND commits: GitHub's squash-merge uses the PR title as the
# resulting commit message on main. If the title is non-conforming
# release-please can't classify the change for CHANGELOG.md. Each
# individual commit is also linted so the feature branch itself stays
# readable in git log.

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  commitlint:
    name: conventional commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install commitlint (isolated — skip repo peer-deps)
        run: |
          # Install into a side directory so npm doesn't try to resolve the
          # repo's full dep graph (which has legit peer-dep mismatches on
          # @capacitor-community/sqlite that pnpm tolerates but npm rejects).
          mkdir -p /tmp/commitlint-runner
          cd /tmp/commitlint-runner || exit
          npm init -y > /dev/null
          npm install \
            @commitlint/cli@19 \
            @commitlint/config-conventional@19 > /dev/null
          echo "/tmp/commitlint-runner/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Write config in the runner dir so extends[] resolves
        run: |
          cat > /tmp/commitlint-runner/commitlint.config.cjs <<'EOF'
          module.exports = {
            extends: ['@commitlint/config-conventional'],
            rules: {
              'subject-case': [0],
              'body-max-line-length': [0],
              'footer-max-line-length': [0]
            }
          };
          EOF

      - name: Lint PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "$PR_TITLE" | commitlint \
            --config /tmp/commitlint-runner/commitlint.config.cjs

      - name: Lint PR commits
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          commitlint \
            --config /tmp/commitlint-runner/commitlint.config.cjs \
            --from "$PR_BASE_SHA" --to "$PR_HEAD_SHA" --verbose
