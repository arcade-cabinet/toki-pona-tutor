; gdUnit4 test manifest for poki soweli
;
; Runner command (headless):
;   godot --headless --path . -s -d res://addons/gdUnit4/bin/GdUnitCmdTool.gd \
;     -a res://test --ignoreHeadlessMode
;
; --ignoreHeadlessMode is required because gdUnit4 otherwise refuses to run
; under --headless (it warns that InputEvent-based tests won't work). Our
; suites are logic-only, so the warning is safe to suppress.
;
; Layout:
;   test/unit/   — pure-logic suites (schema loading, builder output,
;                  encounter rolls, type matchups, catch math, level curves)
;   test/integ/  — integration suites that touch real resources (future)
;
; Suites are auto-discovered by gdUnit4 when their filename starts with `test_`.
; Keep this file in sync with the directory layout so CI / contributors know
; where suites live.

[suites]
unit = res://test/unit
