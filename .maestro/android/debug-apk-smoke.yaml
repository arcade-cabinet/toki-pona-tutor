appId: com.riversreckoning.game
name: Android debug APK smoke
tags:
  - android
  - release-qa
---
- clearState: com.riversreckoning.game
- launchApp:
    clearState: true
- setOrientation: LANDSCAPE_LEFT
- extendedWaitUntil:
    visible: "Rivers Reckoning"
    timeout: 30000
- assertVisible: "New Game"
- assertVisible: "Settings"
- assertVisible: "Quit"
- tapOn: "New Game"
- extendedWaitUntil:
    visible: "Pause menu"
    timeout: 30000
- tapOn:
    point: "68%,56%"
- waitForAnimationToEnd:
    timeout: 6000
- tapOn:
    point: "68%,31%"
- extendedWaitUntil:
    visible: "Rivers, today you start your own investigation."
    timeout: 30000
- tapOn:
    point: "50%,84%"
- extendedWaitUntil:
    visible: "Three creatures answered the call."
    timeout: 30000
- tapOn:
    point: "50%,84%"
- extendedWaitUntil:
    visible: "Choose the partner you trust at your side."
    timeout: 10000
- tapOn:
    point: "50%,84%"
- extendedWaitUntil:
    visible: "Ashcat"
    timeout: 10000
- tapOn: "Ashcat"
- extendedWaitUntil:
    visible: "Pause menu"
    timeout: 20000
- tapOn: "Pause menu"
- extendedWaitUntil:
    visible: "Party"
    timeout: 10000
- assertVisible: "Settings"
- assertVisible: "Gear"
- assertVisible: "Save"
- assertVisible: "Title"
