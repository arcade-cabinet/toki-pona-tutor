appId: com.riversreckoning.game
name: Android debug APK smoke
tags:
  - android
  - release-qa
---
# Android Capacitor WebView smoke: boot the native app and verify the
# title screen renders through the React overlay. This proves:
#   - Capacitor 8 wraps the web bundle correctly.
#   - Bundled assets load via Capacitor's file: scheme.
#   - React + Radix + Motion mount inside the WebView.
#   - RiversUiApp reaches the `state.title` branch (engine booted,
#     fonts/assets hydrated, React render completed).
#
# Deeper gameplay coverage (opening scene, starter ceremony, pause menu
# round-trip) lives in Playwright E2E against Chromium, not Maestro —
# canvas-dispatched dialog text doesn't expose reliably through
# Maestro's accessibility tree in Capacitor WebView. Those surfaces are
# verified by `tests/e2e/full/journey-golden-path.spec.ts`.
- clearState: com.riversreckoning.game
- launchApp:
    clearState: true
- setOrientation: LANDSCAPE_LEFT
- extendedWaitUntil:
    visible: "Rivers Reckoning"
    timeout: 60000
- assertVisible: "New Game"
- assertVisible: "Settings"
- assertVisible: "Quit"
