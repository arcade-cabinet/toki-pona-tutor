appId: com.apple.mobilesafari
name: iOS Safari Pages smoke
tags:
  - ios
  - release-qa
---
# iOS Safari smoke: open the deployed Pages bundle and verify the title
# screen renders through the React overlay. This proves:
#   - GitHub Pages base path (/poki-soweli/) loads without 404s.
#   - React + Radix + Motion mount on real mobile WebKit.
#   - Self-hosted fonts + brand CSS resolve.
#   - RiversUiApp reaches the `state.title` branch (game engine booted,
#     fonts/assets hydrated, React render completed).
#
# Deeper gameplay coverage (opening scene, starter ceremony, pause menu
# round-trip) lives in Playwright E2E against Chromium, not Maestro —
# Safari's accessibility tree doesn't expose canvas-dispatched text
# reliably enough for substring assertions on in-game dialogs. Those
# surfaces are verified by `tests/e2e/full/journey-golden-path.spec.ts`.
- launchApp
- setOrientation: LANDSCAPE_LEFT
- openLink: "https://arcade-cabinet.github.io/poki-soweli/"
- extendedWaitUntil:
    visible: "Rivers Reckoning"
    timeout: 45000
- assertVisible: "New Game"
- assertVisible: "Settings"
- assertVisible: "Quit"
