<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#fdf6e3" />
    <meta
      name="description"
      content="poki soweli is a mobile-first creature-catching RPG for learning toki pona through play."
    />
    <meta name="application-name" content="poki soweli" />
    <meta property="og:title" content="poki soweli" />
    <meta
      property="og:description"
      content="A mobile-first creature-catching RPG for learning toki pona through play."
    />
    <meta property="og:type" content="website" />
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <link rel="icon" type="image/png" sizes="16x16" href="%BASE_URL%icons/poki-soweli-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%icons/poki-soweli-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="%BASE_URL%icons/poki-soweli-48.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="%BASE_URL%icons/poki-soweli-192.png" />
    <title>poki soweli</title>

    <!--
      Preload the body + display fonts so first paint has typography.
      Glyph (nasin-nanpa), mono, and italic variants load on demand when
      a surface needs them. %BASE_URL% is vite's placeholder; resolves
      to '/' in dev, '/poki-soweli/' on GitHub Pages, './' in Capacitor.
    -->
    <link
      rel="preload"
      href="%BASE_URL%assets/fonts/nunito/Nunito-VariableFont.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="%BASE_URL%assets/fonts/fredoka/Fredoka-VariableFont.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <style>
      /*
       * Nunito is the body default once src/styles/fonts.css resolves;
       * the fallback stack stays rounded + warm so the pre-font-load
       * paint doesn't look like a different game.
       */
      html,
      body,
      #game-shell,
      #rpg {
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        font-family: 'Nunito', ui-rounded, 'Hiragino Maru Gothic ProN',
          Quicksand, Comfortaa, Manjari, system-ui, sans-serif;
        background: #fdf6e3; /* matches BRAND.md palette `cream` */
      }
    </style>
  </head>
  <body>
    <main id="game-shell" aria-label="poki soweli game">
      <div id="rpg" role="application" aria-label="poki soweli game canvas"></div>
    </main>
    <script type="module" src="/src/standalone.ts"></script>
  </body>
</html>
