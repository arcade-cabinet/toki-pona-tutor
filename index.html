<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>poki soweli</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <style>
      /* Fredoka is imported via standalone.ts / client.ts CSS bundle.
         Offline-safe system fallback stack below ensures Capacitor builds
         render correctly before the font asset loads — no runtime Google
         Fonts request. */
      body, #rpg {
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        font-family: 'Fredoka', ui-rounded, 'Hiragino Maru Gothic ProN',
                     Quicksand, Comfortaa, Manjari, 'Arial Rounded MT Bold',
                     Calibri, system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="rpg"></div>
    <script type="module" src="/src/standalone.ts"></script>
  </body>
</html>
